name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Backend: Lint ───────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  # ── Frontend: Build ─────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Vite production build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.onrender.com

  # ── Docker: Validate Dockerfiles ────────────────────────────────
  docker-build:
    name: Docker — Build check
    runs-on: ubuntu-latest
    needs: [backend-lint, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t rabbitai-backend ./server

      - name: Build frontend image
        run: docker build --build-arg VITE_API_URL=https://placeholder.onrender.com -t rabbitai-frontend ./frontend
